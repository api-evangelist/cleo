description: >-
  Cleo is an AI-powered personal finance assistant delivered through a chat
  interface in iOS and Android apps. The platform helps consumers budget,
  track spending across linked bank accounts, set savings goals, and access
  features such as Cleo Wallet (savings), Cleo Cover (cash advance), and
  Cleo Builder (credit-building). Cleo connects to user bank accounts using
  Plaid for read-only transaction access and does not currently publish a
  public, third-party developer API.
